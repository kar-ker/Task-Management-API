stages:
  - test
  - deploy

default:
  interruptible: true

test:
  stage: test
  image: node:22-alpine
  script:
    - npm ci
    - npm test
    - npm run build
  cache:
    paths:
      - node_modules/
  only:
    - merge_requests
    - main

deploy:
  stage: deploy
  image: alpine:3.20
  variables:
    GIT_STRATEGY: none
  script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh "$SSH_USER@$SSH_HOST" "cd '$SSH_APP_DIR' && docker compose -p express1 up -d --remove-orphans --build --force-recreate"
  only:
    - main
